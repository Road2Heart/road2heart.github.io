<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教室排课表</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:8px;background:#f8f9fa;font-family:system-ui}
.toolbar{display:flex;justify-content:space-between;margin-bottom:10px}
.title{font-size:18px;margin:0}
.btn-export{background:#1677FF;color:white;border:none;padding:8px 12px;border-radius:10px}
.table-box{background:white;border-radius:12px;overflow:hidden}
.week-header-bar{display:flex;background:#fafafa}
.time-header{width:120px;padding:10px;font-weight:bold;border-right:1px solid #eee}
.week-header-scroll{display:flex;flex:1;overflow-x:auto}
.week-header-item{min-width:110px;padding:10px;text-align:center;font-weight:bold;border-right:1px solid #eee}
.body-row{display:flex;border-top:1px solid #eee}
.body-row-time{width:120px;padding:8px;background:#fafafa;border-right:1px solid #eee}
.body-row-cells{display:flex;flex:1;overflow-x:auto}
.body-cell{min-width:110px;padding:8px;border-right:1px solid #eee}
.course-item{padding:8px;border-radius:8px;margin-bottom:6px;color:white;font-size:13px}
.room-name{font-weight:bold}
input{width:100%;padding:6px;margin-bottom:6px;border-radius:6px;border:1px solid #ddd}
.add-btn{width:100%;padding:7px;background:#e6f7ff;color:#1677FF;border:none;border-radius:6px}
</style>
</head>
<body>
<div class="toolbar">
  <div class="title">教室排课表</div>
  <button class="btn-export" onclick="exportExcel()">导出 Excel</button>
</div>
<div class="table-box">
  <div class="week-header-bar">
    <div class="time-header">时间</div>
    <div class="week-header-scroll">
      <div class="week-header-item">周一</div>
      <div class="week-header-item">周二</div>
      <div class="week-header-item">周三</div>
      <div class="week-header-item">周四</div>
      <div class="week-header-item">周五</div>
      <div class="week-header-item">周六</div>
      <div class="week-header-item">周日</div>
    </div>
  </div>
  <div id="schedule-body"></div>
</div>

<script>
const times = [
  "08:00-08:45","09:00-09:45","10:00-10:45","11:00-11:45","12:00-12:45",
  "13:00-13:45","14:00-14:45","15:00-15:45","16:00-16:45","17:00-17:45"
];
const data = Array.from({length:7},()=>Array.from({length:10},()=>[]));
const colorList = ["#1677FF","#FF4D4F","#52C41A","#FAAD14","#722ED1","#13C2C2","#EB2F96"];
const roomColorMap = {};

function getRoomColor(room){
  if(!roomColorMap[room]){
    const idx = Object.keys(roomColorMap).length % colorList.length;
    roomColorMap[room] = colorList[idx];
  }
  return roomColorMap[room];
}

function render(){
  const body = document.getElementById("schedule-body");
  body.innerHTML = "";
  times.forEach((time,ti)=>{
    const row = document.createElement("div");
    row.className = "body-row";
    const timeCell = document.createElement("div");
    timeCell.className = "body-row-time";
    const timeInput = document.createElement("input");
    timeInput.value = time;
    timeInput.onchange = ()=>{ times[ti] = timeInput.value.trim(); };
    timeCell.appendChild(timeInput);
    row.appendChild(timeCell);
    const cellsWrap = document.createElement("div");
    cellsWrap.className = "body-row-cells";
    for(let wi=0;wi<7;wi++){
      const cell = document.createElement("div");
      cell.className = "body-cell";
      data[wi][ti].forEach(item=>{
        const div = document.createElement("div");
        div.className = "course-item";
        div.style.backgroundColor = getRoomColor(item.room);
        div.innerHTML = `<div class="room-name">${item.room}</div>${item.teacher}`;
        cell.appendChild(div);
      });
      const iptRoom = document.createElement("input");
      iptRoom.placeholder = "教室";
      const iptTeacher = document.createElement("input");
      iptTeacher.placeholder = "老师";
      const btn = document.createElement("button");
      btn.className = "add-btn";
      btn.textContent = "确认";
      btn.onclick = ()=>{
        const room = iptRoom.value.trim();
        const teacher = iptTeacher.value.trim();
        if(!room||!teacher)return;
        data[wi][ti].push({room,teacher});
        render();
      };
      cell.appendChild(iptRoom);
      cell.appendChild(iptTeacher);
      cell.appendChild(btn);
      cellsWrap.appendChild(cell);
    }
    row.appendChild(cellsWrap);
    body.appendChild(row);
  });
}

function exportExcel(){
  let html = `
  <!DOCTYPE html>
  <meta charset="utf-8">
  <table border="1" cellpadding="5" cellspacing="0">
    <tr>
      <th width="160">时间</th>
      <th width="220">周一</th>
      <th width="220">周二</th>
      <th width="220">周三</th>
      <th width="220">周四</th>
      <th width="220">周五</th>
      <th width="220">周六</th>
      <th width="220">周日</th>
    </tr>
  `;

  times.forEach((time,ti)=>{
    html += `<tr style="vertical-align:top">`;
    html += `<td>${time}</td>`;
    for(let wi=0;wi<7;wi++){
      const items = data[wi][ti];
      let cell = "";
      items.forEach(it=>{
        const color = getRoomColor(it.room);
        cell += `<div style="color:${color};font-weight:bold;margin:2px 0">${it.room} ${it.teacher}</div>`;
      });
      html += `<td style="white-space:pre-wrap">${cell}</td>`;
    }
    html += `</tr>`;
  });
  html += `</table>`;

  const blob = new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "排课表.xls";
  a.click();
}

render();
</script>
</body>
</html>
